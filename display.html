<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flux Display</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Space Mono',monospace;background:#080808;color:#f2f2f2;}
:root{--accent:#1DB954;--glow:rgba(29,185,84,0.25);--bg:#080808;}

/* SETUP */
#setup{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:48px;background:#080808;}
#setup h1{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;color:#1DB954;letter-spacing:4px;}
#setup p{color:#444;font-size:0.75rem;text-align:center;max-width:400px;line-height:1.7;}
#setup label{font-size:0.6rem;color:#444;letter-spacing:2px;align-self:flex-start;margin-left:calc(50% - 200px);}
#setup input{width:100%;max-width:400px;background:#111;border:1px solid #222;border-radius:4px;padding:12px 16px;color:#f2f2f2;font-family:'Space Mono',monospace;font-size:0.8rem;outline:none;transition:border-color .2s;text-align:center;letter-spacing:2px;}
#setup input:focus{border-color:#1DB954;}
#setup .err{color:#ef4444;font-size:0.72rem;display:none;}
#setup .btn{background:#1DB954;color:#000;border:none;border-radius:4px;padding:12px 32px;font-family:'Space Mono',monospace;font-size:0.8rem;font-weight:700;cursor:pointer;margin-top:6px;transition:opacity .2s;}
#setup .btn:hover{opacity:.85;}
#setup .btn:disabled{opacity:.4;cursor:not-allowed;}

/* APP */
#app{display:none;height:100vh;position:relative;overflow:hidden;}
#bg-blur{position:absolute;inset:-80px;background-size:cover;background-position:center;filter:blur(100px) saturate(1.8) brightness(0.14);opacity:0;transition:opacity 3s ease,background-image 2s ease;z-index:0;}
#bg-blur.visible{opacity:1;}
#color-overlay{position:absolute;inset:0;z-index:1;opacity:0;transition:opacity 2s ease;pointer-events:none;}
#color-overlay.visible{opacity:1;}
#app::after{content:'';position:absolute;inset:0;z-index:2;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;}
#main-layout{position:relative;z-index:3;height:100vh;display:grid;grid-template-rows:56px 68px 1fr 44px;}

/* TOPBAR */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(0,0,0,0.5);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,0.05);}
.topbar-left{display:flex;align-items:center;gap:14px;}
.brand{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:var(--accent);transition:color 1.5s;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.8s infinite;transition:background 1.5s;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.2;transform:scale(.5)}}
#clock{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:rgba(255,255,255,0.28);letter-spacing:3px;}
.quit-btn{background:none;border:1px solid rgba(255,255,255,0.07);color:rgba(255,255,255,0.18);border-radius:3px;padding:4px 9px;font-family:'Space Mono',monospace;font-size:0.58rem;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.quit-btn:hover{border-color:#ef4444;color:#ef4444;}

/* NPBAR */
#npbar{display:flex;align-items:center;gap:18px;padding:0 32px;background:rgba(0,0,0,0.38);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.04);}
#np-art-small{width:40px;height:40px;border-radius:4px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,0.04);transition:opacity .6s,src .4s;}
#np-art-small.loading{opacity:0.12;}
.np-meta{flex:1;overflow:hidden;}
.np-label{font-size:0.5rem;color:var(--accent);letter-spacing:2px;margin-bottom:1px;transition:color 1.5s;}
#np-title{font-size:0.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity .3s;}
#np-artist{font-size:0.68rem;color:rgba(255,255,255,0.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#progress-wrap{flex:1;max-width:260px;}
#progress-track{height:2px;background:rgba(255,255,255,0.07);border-radius:1px;overflow:hidden;margin-bottom:4px;}
#progress-fill{height:100%;background:var(--accent);border-radius:1px;width:0%;transition:width 1s linear,background 1.5s;}
.progress-times{display:flex;justify-content:space-between;font-size:0.56rem;color:rgba(255,255,255,0.18);}

/* CONTENT */
#content{display:grid;grid-template-columns:1fr 340px;overflow:hidden;}

/* LEFT */
#left-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 36px;border-right:1px solid rgba(255,255,255,0.04);position:relative;overflow:hidden;}

#no-music{display:flex;flex-direction:column;align-items:center;gap:12px;position:absolute;opacity:0;pointer-events:none;transition:opacity .8s;}
#no-music.visible{opacity:1;}
.nm-icon{font-size:2.2rem;opacity:0.1;}
.nm-text{font-size:0.62rem;color:rgba(255,255,255,0.15);letter-spacing:4px;}

#album-wrap{position:relative;opacity:0;transform:scale(0.94);transition:opacity .6s,transform .6s;}
#album-wrap.visible{opacity:1;transform:scale(1);}
#album-wrap.lyrics-mode{opacity:0;transform:scale(0.7);pointer-events:none;}
#np-art-big{width:220px;height:220px;border-radius:12px;object-fit:cover;display:block;box-shadow:0 0 120px var(--glow),0 32px 64px rgba(0,0,0,0.7);transition:box-shadow 2s,opacity .6s;}
.vinyl-ring{position:absolute;inset:-18px;border-radius:50%;border:1px solid rgba(255,255,255,0.06);animation:spin 16s linear infinite;opacity:0;transition:opacity .5s;}
.vinyl-ring.visible{opacity:0.2;}
@keyframes spin{to{transform:rotate(360deg);}}

#waveform{display:flex;align-items:flex-end;gap:3px;height:28px;margin-top:16px;opacity:0;transition:opacity .4s;}
#waveform.visible{opacity:0.4;}
#waveform.lyrics-mode{opacity:0;}
.wbar{width:3px;border-radius:2px;background:var(--accent);animation:wb .9s ease-in-out infinite;transition:background 1.5s;}
@keyframes wb{0%,100%{transform:scaleY(0.25)}50%{transform:scaleY(1)}}

/* LYRICS */
#lyrics-panel{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 56px;opacity:0;pointer-events:none;transition:opacity .5s;overflow:hidden;}
#lyrics-panel.visible{opacity:1;pointer-events:auto;}
/* Readability backdrop — independent of album accent color */
#lyrics-panel::before{
  content:'';position:absolute;inset:0;z-index:0;
  background:rgba(5,5,5,0.72);
  backdrop-filter:blur(2px);
}
#lyrics-scroll{width:100%;max-width:760px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative;z-index:1;}
#lyrics-inner{display:flex;flex-direction:column;align-items:center;gap:14px;transition:transform .6s cubic-bezier(0.4,0,0.2,1);will-change:transform;}
.lyric-line{
  font-family:'DM Sans',sans-serif;font-size:1.5rem;font-weight:300;
  text-align:center;line-height:1.55;padding:4px 8px;
  color:rgba(255,255,255,0.32);
  transition:color .55s ease,font-size .45s ease,font-weight .4s ease,opacity .45s ease,transform .45s ease;
  opacity:0.55;white-space:pre-wrap;transform:scale(0.94);
  will-change:transform,opacity,color;
}
.lyric-line.near{color:rgba(255,255,255,0.85);opacity:0.9;}
.lyric-line.near2{color:rgba(255,255,255,0.4);opacity:0.6;transform:scale(0.97);}
.lyric-line.near1{color:rgba(255,255,255,0.75);opacity:0.92;font-size:1.7rem;transform:scale(0.99);}
.lyric-line.active{
  color:#fff;font-size:2.4rem;font-weight:700;
  opacity:1;text-shadow:0 2px 30px rgba(0,0,0,0.8),0 0 60px var(--glow);
  transform:scale(1);
}
.lyric-line.past1{color:rgba(255,255,255,0.42);opacity:0.6;font-size:1.5rem;transform:scale(0.97);}
.lyric-line.past2{color:rgba(255,255,255,0.22);opacity:0.38;font-size:1.35rem;transform:scale(0.94);}
.lyric-line.far{opacity:0.18;transform:scale(0.9);}
.lyric-line.empty-line{height:12px;opacity:0;}
.lyrics-status{color:rgba(255,255,255,0.5);font-size:0.72rem;letter-spacing:3px;text-transform:uppercase;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.lyrics-status.loading{animation:blink 1.4s infinite;}

/* RIGHT */
#right-panel{display:flex;flex-direction:column;background:rgba(0,0,0,0.3);backdrop-filter:blur(12px);overflow:hidden;}
#queue-header{padding:16px 20px 10px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#queue-header h2{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;color:rgba(255,255,255,0.25);letter-spacing:3px;}
.queue-badge{font-size:0.55rem;background:var(--accent);color:#000;padding:2px 7px;border-radius:2px;font-weight:700;transition:background 1.5s;}

/* Queue sections */
.q-section-label{font-size:0.5rem;color:rgba(255,255,255,0.2);letter-spacing:2px;padding:10px 14px 4px;text-transform:uppercase;flex-shrink:0;}
#queue-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 10px 10px;}
#queue-scroll::-webkit-scrollbar{width:2px;}
#queue-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);}

.q-item{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:6px;padding:8px 10px;margin-bottom:5px;transition:border-color .4s,opacity .4s;will-change:transform;}
.q-item.next-up{border-color:var(--accent);background:rgba(255,255,255,0.05);}
.q-item.entering{animation:qEnter .35s ease forwards;}
@keyframes qEnter{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}
.q-num{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:rgba(255,255,255,0.12);width:18px;flex-shrink:0;text-align:right;}
.q-item.next-up .q-num{color:var(--accent);transition:color 1.5s;}
.q-art{width:34px;height:34px;border-radius:3px;object-fit:cover;flex-shrink:0;}
.q-info{flex:1;overflow:hidden;}
.q-name{font-size:0.72rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.q-artist{font-size:0.58rem;color:rgba(255,255,255,0.3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.q-tag{font-size:0.48rem;padding:2px 5px;border-radius:2px;flex-shrink:0;font-weight:700;letter-spacing:.5px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.25);}
.q-tag.requested{background:rgba(29,185,84,0.12);color:rgba(29,185,84,0.7);}
.q-empty{color:rgba(255,255,255,0.14);font-size:0.66rem;text-align:center;padding:24px 0;letter-spacing:2px;}

/* BOTTOMBAR */
#bottombar{display:flex;align-items:center;justify-content:space-between;padding:0 32px;border-top:1px solid rgba(255,255,255,0.04);background:rgba(0,0,0,0.45);backdrop-filter:blur(20px);}
#pending-pill{display:flex;align-items:center;gap:6px;font-size:0.58rem;color:rgba(255,255,255,0.2);}
#pending-pill .p-num{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--accent);transition:color 1.5s;}
#lyrics-toggle{background:none;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.3);border-radius:4px;padding:5px 13px;font-family:'Space Mono',monospace;font-size:0.6rem;cursor:pointer;letter-spacing:1px;transition:all .2s;}
#lyrics-toggle:hover,#lyrics-toggle.on{border-color:var(--accent);color:var(--accent);}
</style>
</head>
<body>

<div id="setup">
  <h1>📺 FLUX DISPLAY</h1>
  <p>Entre le nom de la fête et le mot de passe.</p>
  <label>NOM DE LA FÊTE</label>
  <input id="setup-code" type="text" placeholder="FIESTA24" maxlength="20"
         oninput="this.value=this.value.toUpperCase()"
         onkeydown="if(event.key==='Enter')document.getElementById('setup-pass').focus()"/>
  <label style="margin-top:10px">MOT DE PASSE</label>
  <input id="setup-pass" type="password" placeholder="••••••••"
         onkeydown="if(event.key==='Enter')doSetup()"/>
  <div class="err" id="setup-err"></div>
  <button class="btn" id="setup-btn" onclick="doSetup()">Lancer →</button>
</div>

<div id="app">
  <div id="bg-blur"></div>
  <div id="color-overlay"></div>
  <div id="main-layout">

    <div id="topbar">
      <div class="topbar-left">
        <div class="brand">🎵 FLUX</div>
        <div class="live-dot"></div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div id="clock">00:00</div>
        <button class="quit-btn" onclick="logoutDisplay()">⏻ QUITTER</button>
      </div>
    </div>

    <div id="npbar">
      <img id="np-art-small" class="loading" src="" alt="">
      <div class="np-meta">
        <div class="np-label">▶ EN COURS</div>
        <div id="np-title">—</div>
        <div id="np-artist">—</div>
      </div>
      <div id="progress-wrap">
        <div id="progress-track"><div id="progress-fill"></div></div>
        <div class="progress-times"><span id="p-elapsed">0:00</span><span id="p-duration">0:00</span></div>
      </div>
    </div>

    <div id="content">
      <div id="left-panel">
        <div id="no-music" class="visible">
          <div class="nm-icon">🎵</div>
          <div class="nm-text">Aucune musique en cours</div>
        </div>
        <div id="album-wrap">
          <div class="vinyl-ring" id="vinyl"></div>
          <img id="np-art-big" src="" alt="">
        </div>
        <div id="lyrics-panel">
          <div id="lyrics-scroll">
            <div id="lyrics-inner"></div>
          </div>
        </div>
        <div id="waveform">
          <div class="wbar" style="height:10px;animation-delay:0s"></div>
          <div class="wbar" style="height:24px;animation-delay:.12s"></div>
          <div class="wbar" style="height:16px;animation-delay:.22s"></div>
          <div class="wbar" style="height:32px;animation-delay:.06s"></div>
          <div class="wbar" style="height:20px;animation-delay:.16s"></div>
          <div class="wbar" style="height:28px;animation-delay:.26s"></div>
          <div class="wbar" style="height:12px;animation-delay:.32s"></div>
          <div class="wbar" style="height:36px;animation-delay:.09s"></div>
          <div class="wbar" style="height:18px;animation-delay:.19s"></div>
          <div class="wbar" style="height:26px;animation-delay:.23s"></div>
        </div>
      </div>

      <div id="right-panel">
        <div id="queue-header">
          <h2>FILE D'ATTENTE</h2>
          <span class="queue-badge" id="queue-count">0</span>
        </div>
        <div id="queue-scroll">
          <div class="q-empty">En attente...</div>
        </div>
      </div>
    </div>

    <div id="bottombar">
      <div id="pending-pill">
        <span class="p-num" id="pending-count">0</span>
        <span>demandes en attente</span>
      </div>
      <button id="lyrics-toggle" onclick="toggleLyrics()">🎤 PAROLES</button>
    </div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwue-u0fUbeHM1gj0VbUy2drIEcRUDWtysNHfeqrTOSCKyhBt3bq4U6bV9VsqmgMYbkrg/exec';

const S = {
  session:null, lyricsOn:false, lyrics:[], progressTimer:null,
  currentTrackId:null, progressMs:0, durationMs:0, isPlaying:false,
  lastQueueIds:[], lastPendingCount:0,
};
let lastActiveIdx=-1;

// ── Color extraction ──
function extractColor(url){
  return new Promise(resolve=>{
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>{
      try{
        const c=document.createElement('canvas'); c.width=c.height=40;
        const ctx=c.getContext('2d'); ctx.drawImage(img,0,0,40,40);
        const d=ctx.getImageData(0,0,40,40).data;
        let r=0,g=0,b=0,n=0;
        for(let i=0;i<d.length;i+=12){
          const sat=Math.max(d[i],d[i+1],d[i+2])-Math.min(d[i],d[i+1],d[i+2]);
          if(sat>30){r+=d[i];g+=d[i+1];b+=d[i+2];n++;}
        }
        if(!n){resolve('#1DB954');return;}
        r=r/n;g=g/n;b=b/n;
        const k=1.6;
        r=Math.min(255,Math.max(0,128+(r-128)*k));
        g=Math.min(255,Math.max(0,128+(g-128)*k));
        b=Math.min(255,Math.max(0,128+(b-128)*k));
        // Ensure minimum brightness so text/icons stay readable on dark bg
        const lum=0.299*r+0.587*g+0.114*b;
        const MIN_LUM=130;
        if(lum<MIN_LUM){
          const t=(MIN_LUM-lum)/(255-lum||1);
          r=r+(255-r)*t; g=g+(255-g)*t; b=b+(255-b)*t;
        }
        resolve(`rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`);
      }catch(e){resolve('#1DB954');}
    };
    img.onerror=()=>resolve('#1DB954');
    img.src=url;
  });
}
function applyAccent(color){
  document.documentElement.style.setProperty('--accent',color);
  const glow=color.startsWith('rgb(')?color.replace('rgb(','rgba(').replace(')',',0.3)'):'rgba(29,185,84,0.3)';
  document.documentElement.style.setProperty('--glow',glow);
}

// ── SETUP ──
window.addEventListener('DOMContentLoaded',()=>{
  const s=localStorage.getItem('display_session');
  if(s) document.getElementById('setup-code').value=s;
});

async function doSetup(){
  const code=document.getElementById('setup-code').value.trim().toUpperCase();
  const pass=document.getElementById('setup-pass').value.trim();
  const err=document.getElementById('setup-err');
  const btn=document.getElementById('setup-btn');
  err.style.display='none';
  if(!code||!pass){err.textContent='Remplis les deux champs';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='...';
  try{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'validateSession',code,password:pass})});
    const d=await r.json();
    if(d.error){err.textContent='Code ou mot de passe incorrect';err.style.display='block';return;}
    localStorage.setItem('display_session',code);
    S.session=code; startApp();
  }catch(e){err.textContent='Erreur réseau';err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='Lancer →';}
}

function startApp(){
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='block';
  tickClock(); setInterval(tickClock,1000);
  fetchNowPlaying(); setInterval(fetchNowPlaying,5000);
  pollQueue(); setInterval(pollQueue,3000);
  pollPending(); setInterval(pollPending,5000);
}

function tickClock(){
  document.getElementById('clock').textContent=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}
function logoutDisplay(){
  if(!confirm('Quitter ?'))return;
  localStorage.removeItem('display_session'); location.reload();
}

// ── NOW PLAYING ──
async function fetchNowPlaying(){
  if(!S.session)return;
  try{
    const r=await fetch(`${API}?action=nowplaying&session=${S.session}`);
    const d=await r.json();
    if(!d.playing){if(S.isPlaying)setNoMusic();return;}
    S.isPlaying=true;
    S.progressMs=d.progress_ms||0; S.durationMs=d.duration_ms||1;
    startProgressTick();
    // Update npbar text (no flicker)
    setTextIfChanged('np-title',d.name);
    setTextIfChanged('np-artist',d.artist);
    const sm=document.getElementById('np-art-small');
    if(sm.dataset.src!==d.artSmall){sm.src=d.artSmall||d.art||'';sm.dataset.src=d.artSmall;sm.classList.remove('loading');}
    if(d.id!==S.currentTrackId){
      S.currentTrackId=d.id;
      const big=document.getElementById('np-art-big');
      if(big.dataset.src!==d.art){big.src=d.art||'';big.dataset.src=d.art;}
      const blur=document.getElementById('bg-blur');
      blur.style.backgroundImage=`url(${d.art})`;
      blur.classList.add('visible');
      document.getElementById('no-music').classList.remove('visible');
      document.getElementById('album-wrap').classList.add('visible');
      document.getElementById('waveform').classList.add('visible');
      document.getElementById('vinyl').classList.add('visible');
      if(d.art){
        const color=await extractColor(d.art);
        applyAccent(color);
        const ov=document.getElementById('color-overlay');
        ov.style.background=`radial-gradient(ellipse at 25% 55%, ${color.replace('rgb(','rgba(').replace(')',',0.06)')} 0%, transparent 55%)`;
        ov.classList.add('visible');
      }
      if(S.lyricsOn) fetchLyrics(d.name,d.artist,d.album,d.duration_ms);
    }
  }catch(e){}
}

function setNoMusic(){
  S.isPlaying=false; S.currentTrackId=null; clearInterval(S.progressTimer);
  document.getElementById('no-music').classList.add('visible');
  document.getElementById('album-wrap').classList.remove('visible');
  document.getElementById('waveform').classList.remove('visible');
  document.getElementById('vinyl').classList.remove('visible');
  document.getElementById('bg-blur').classList.remove('visible');
  document.getElementById('color-overlay').classList.remove('visible');
  setTextIfChanged('np-title','—'); setTextIfChanged('np-artist','');
  document.getElementById('progress-fill').style.width='0%';
  document.getElementById('p-elapsed').textContent='0:00';
  document.getElementById('p-duration').textContent='0:00';
  applyAccent('#1DB954');
  if(S.lyricsOn) clearLyrics('');
}

function setTextIfChanged(id,val){
  const el=document.getElementById(id);
  if(el.textContent!==val) el.textContent=val;
}

function startProgressTick(){
  clearInterval(S.progressTimer);
  S.progressTimer=setInterval(()=>{
    S.progressMs=Math.min(S.progressMs+1000,S.durationMs);
    document.getElementById('progress-fill').style.width=(S.progressMs/S.durationMs*100)+'%';
    document.getElementById('p-elapsed').textContent=msToTime(S.progressMs);
    document.getElementById('p-duration').textContent=msToTime(S.durationMs);
    if(S.lyricsOn&&S.lyrics.length) updateActiveLyric(S.progressMs/1000);
  },1000);
}
function msToTime(ms){const s=Math.floor(ms/1000);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}

// ── QUEUE — diff update (no flicker) ──
async function pollQueue(){
  if(!S.session)return;
  try{
    const r=await fetch(`${API}?action=spotifyqueue&session=${S.session}`);
    const d=await r.json();
    updateQueueDOM(d.queue_requested||[], d.queue_auto||[]);
  }catch(e){}
}

function updateQueueDOM(requested, auto){
  const total=requested.length+auto.length;
  document.getElementById('queue-count').textContent=total;

  // Diff check — avoid redraw if nothing changed
  const newIds=[...requested,...auto].map(t=>t.id).join(',');
  if(S.lastQueueIds===newIds) return;
  S.lastQueueIds=newIds;

  const container=document.getElementById('queue-scroll');
  const frag=document.createDocumentFragment();

  if(!total){
    const empty=document.createElement('div');
    empty.className='q-empty'; empty.textContent='File vide';
    frag.appendChild(empty);
    container.innerHTML=''; container.appendChild(frag); return;
  }

  // Section 1: Demandes (manual queue)
  if(requested.length){
    const lbl=document.createElement('div');
    lbl.className='q-section-label';
    lbl.textContent="FILE D'ATTENTE";
    frag.appendChild(lbl);
    requested.forEach((t,i)=>{
      frag.appendChild(makeQItem(t, i+1, i===0, true));
    });
  }

  // Section 2: Auto (playlist continuation)
  if(auto.length){
    const lbl=document.createElement('div');
    lbl.className='q-section-label';
    lbl.textContent='À SUIVRE';
    frag.appendChild(lbl);
    auto.forEach((t,i)=>{
      frag.appendChild(makeQItem(t, i+1, false, false));
    });
  }

  container.innerHTML='';
  container.appendChild(frag);
}

function makeQItem(t, num, isNext, isRequested){
  const div=document.createElement('div');
  div.className='q-item'+(isNext?' next-up':'')+' entering';
  div.dataset.id=t.id;
  div.innerHTML=`
    <div class="q-num">${num}</div>
    <img class="q-art" src="${t.img}" alt="" loading="lazy">
    <div class="q-info">
      <div class="q-name">${t.name}</div>
      <div class="q-artist">${t.artist}</div>
    </div>
    ${isRequested?'<span class="q-tag requested">DEMANDÉ</span>':''}
  `;
  return div;
}

// ── PENDING COUNT ──
async function pollPending(){
  if(!S.session)return;
  try{
    const r=await fetch(`${API}?action=list&session=${S.session}`);
    const rows=await r.json();
    const count=rows.filter(r=>r.status==='pending').length;
    if(count!==S.lastPendingCount){
      S.lastPendingCount=count;
      document.getElementById('pending-count').textContent=count;
    }
  }catch(e){}
}

// ── LYRICS ──
function toggleLyrics(){
  S.lyricsOn=!S.lyricsOn;
  const btn=document.getElementById('lyrics-toggle');
  const panel=document.getElementById('lyrics-panel');
  const wrap=document.getElementById('album-wrap');
  const wave=document.getElementById('waveform');
  const vinyl=document.getElementById('vinyl');
  btn.classList.toggle('on',S.lyricsOn);
  if(S.lyricsOn){
    panel.classList.add('visible');
    wrap.classList.add('lyrics-mode');
    wave.classList.add('lyrics-mode');
    vinyl.classList.remove('visible');
    if(S.currentTrackId) fetchLyrics(
      document.getElementById('np-title').textContent,
      document.getElementById('np-artist').textContent,
      '', S.durationMs
    );
  }else{
    panel.classList.remove('visible');
    wrap.classList.remove('lyrics-mode');
    wave.classList.remove('lyrics-mode');
    if(S.isPlaying) vinyl.classList.add('visible');
    S.lyrics=[];
  }
}

async function fetchLyrics(title,artist,album,durationMs){
  clearLyrics('loading');
  S.lyrics=[];
  lastActiveIdx=-1;
  try{
    const params=new URLSearchParams({track_name:title,artist_name:artist});
    if(album) params.set('album_name',album);
    if(durationMs) params.set('duration',Math.floor(durationMs/1000));
    const r=await fetch(`https://lrclib.net/api/get?${params}`);
    if(!r.ok){clearLyrics('unavailable');return;}
    const data=await r.json();
    if(data.syncedLyrics){
      S.lyrics=parseSynced(data.syncedLyrics);
      buildLyricsDOM(); updateActiveLyric(S.progressMs/1000);
    }else if(data.plainLyrics){
      buildPlainLyrics(data.plainLyrics);
    }else{clearLyrics('unavailable');}
  }catch(e){clearLyrics('error');}
}

function clearLyrics(state){
  const inner=document.getElementById('lyrics-inner');
  inner.style.transform='translateY(0)';
  lastActiveIdx=-1;
  const msgs={loading:'CHARGEMENT DES PAROLES',unavailable:'PAROLES NON DISPONIBLES',error:'ERREUR DE CHARGEMENT'};
  inner.innerHTML=state?`<div class="lyrics-status${state==='loading'?' loading':''}">${msgs[state]}</div>`:'';
}

function parseSynced(raw){
  return raw.split('\n').map(line=>{
    const m=line.match(/^\[(\d+):(\d+(?:\.\d+)?)\](.*)/);
    if(!m)return null;
    const text=m[3].trim();
    return{time:parseInt(m[1])*60+parseFloat(m[2]),text:text};
  }).filter(Boolean);
}

function buildLyricsDOM(){
  const inner=document.getElementById('lyrics-inner');
  inner.innerHTML=S.lyrics.map((l,i)=>
    `<div class="lyric-line${l.text===''?' empty-line':''}" data-i="${i}">${l.text||''}</div>`
  ).join('');
}

function buildPlainLyrics(plain){
  const inner=document.getElementById('lyrics-inner');
  inner.innerHTML=plain.split('\n').map(l=>
    l.trim()?`<div class="lyric-line near">${l}</div>`:'<div class="lyric-line empty-line"></div>'
  ).join('');
}

function updateActiveLyric(sec){
  if(!S.lyrics.length)return;
  let idx=0;
  for(let i=0;i<S.lyrics.length;i++){if(S.lyrics[i].time<=sec)idx=i;else break;}
  if(idx===lastActiveIdx)return;
  lastActiveIdx=idx;

  const lines=document.querySelectorAll('#lyrics-inner .lyric-line');
  lines.forEach((el,i)=>{
    const d=i-idx;
    el.classList.remove('active','near1','near2','past1','past2','far');
    if(d===0)        el.classList.add('active');
    else if(d===1)   el.classList.add('near1');
    else if(d===2)   el.classList.add('near2');
    else if(d===-1)  el.classList.add('past1');
    else if(d===-2)  el.classList.add('past2');
    else             el.classList.add('far');
  });

  // Smooth translate — no scrollIntoView jank
  const inner=document.getElementById('lyrics-inner');
  const scroll=document.getElementById('lyrics-scroll');
  const activeLine=inner.children[idx];
  if(!activeLine)return;
  const scrollH=scroll.offsetHeight;
  const lineTop=activeLine.offsetTop+activeLine.offsetHeight/2;
  inner.style.transform=`translateY(${Math.round(scrollH/2-lineTop)}px)`;
}
</script>
