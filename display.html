<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flux Display</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body { font-family:'Space Mono',monospace; background:#070707; color:#f2f2f2; }

/* ── CSS VARS (updated dynamically) ── */
:root { --accent:#1DB954; --glow:rgba(29,185,84,0.25); }

/* ── SETUP ── */
#setup {
  position:fixed; inset:0; z-index:999;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:14px; padding:48px; background:#070707; font-family:'Space Mono',monospace;
}
#setup h1 { font-family:'Bebas Neue',sans-serif; font-size:2.8rem; color:#1DB954; letter-spacing:4px; }
#setup p  { color:#555; font-size:0.75rem; text-align:center; max-width:420px; line-height:1.7; }
#setup label { font-size:0.6rem; color:#444; letter-spacing:2px; align-self:flex-start; margin-left:calc(50% - 210px); }
#setup input {
  width:100%; max-width:420px; background:#111; border:1px solid #222;
  border-radius:4px; padding:12px 16px; color:#f2f2f2;
  font-family:'Space Mono',monospace; font-size:0.8rem;
  outline:none; transition:border-color .2s; text-align:center; letter-spacing:2px;
}
#setup input:focus { border-color:#1DB954; }
#setup .err { color:#ef4444; font-size:0.72rem; display:none; }
#setup .btn-setup {
  background:#1DB954; color:#000; border:none; border-radius:4px;
  padding:12px 32px; font-family:'Space Mono',monospace; font-size:0.8rem;
  font-weight:700; cursor:pointer; margin-top:6px; transition:opacity .2s;
}
#setup .btn-setup:hover { opacity:.85; }
#setup .btn-setup:disabled { opacity:.4; cursor:not-allowed; }

/* ── APP ── */
#app { display:none; height:100vh; position:relative; overflow:hidden; }

#bg-blur {
  position:absolute; inset:-60px; background-size:cover; background-position:center;
  filter:blur(90px) saturate(1.6) brightness(0.16);
  opacity:0; transition:opacity 2.5s ease, background-image 1.8s ease; z-index:0;
}
#bg-blur.visible { opacity:1; }

#color-overlay {
  position:absolute; inset:0; z-index:1; opacity:0;
  transition:opacity 1.8s ease; pointer-events:none;
}
#color-overlay.visible { opacity:1; }

/* grain */
#app::after {
  content:''; position:absolute; inset:0; z-index:2;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none; opacity:.5;
}

#main-layout { position:relative; z-index:3; height:100vh; display:grid; grid-template-rows:auto auto 1fr auto; }

/* ── TOP BAR ── */
#topbar {
  display:flex; align-items:center; justify-content:space-between; padding:16px 32px;
  background:rgba(0,0,0,0.45); backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.topbar-left { display:flex; align-items:center; gap:14px; }
.brand { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:3px; color:var(--accent); transition:color 1.2s; }
.live-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 1.8s infinite; transition:background 1.2s; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.2;transform:scale(.5)} }
#clock { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; color:rgba(255,255,255,0.3); letter-spacing:3px; }
.quit-btn {
  background:none; border:1px solid rgba(255,255,255,0.08); color:rgba(255,255,255,0.2);
  border-radius:3px; padding:5px 10px; font-family:'Space Mono',monospace; font-size:0.6rem;
  cursor:pointer; letter-spacing:1px; transition:all .2s;
}
.quit-btn:hover { border-color:#ef4444; color:#ef4444; }

/* ── NOW PLAYING BAR ── */
#npbar {
  display:flex; align-items:center; gap:18px; padding:12px 32px;
  background:rgba(0,0,0,0.38); backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.04);
}
#np-art-small { width:42px; height:42px; border-radius:4px; object-fit:cover; flex-shrink:0; background:rgba(255,255,255,0.05); transition:opacity .5s; }
#np-art-small.loading { opacity:0.15; }
.np-meta { flex:1; overflow:hidden; }
.np-label { font-size:0.52rem; color:var(--accent); letter-spacing:2px; margin-bottom:2px; transition:color 1.2s; }
#np-title  { font-size:0.9rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:opacity .4s; }
#np-artist { font-size:0.7rem; color:rgba(255,255,255,0.38); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#progress-wrap { flex:1; max-width:280px; }
#progress-track { height:2px; background:rgba(255,255,255,0.08); border-radius:1px; overflow:hidden; margin-bottom:4px; }
#progress-fill  { height:100%; background:var(--accent); border-radius:1px; width:0%; transition:width .9s linear, background 1.2s; }
.progress-times { display:flex; justify-content:space-between; font-size:0.58rem; color:rgba(255,255,255,0.18); }

/* ── CONTENT ── */
#content { display:grid; grid-template-columns:1fr 360px; overflow:hidden; }

/* ── LEFT PANEL ── */
#left-panel {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:28px 40px; border-right:1px solid rgba(255,255,255,0.04);
  position:relative; overflow:hidden;
}

/* No music */
#no-music {
  display:flex; flex-direction:column; align-items:center; gap:14px;
  opacity:0; pointer-events:none; transition:opacity .8s; position:absolute;
}
#no-music.visible { opacity:1; }
.nm-icon { font-size:2.5rem; opacity:0.12; }
.nm-text { font-size:0.65rem; color:rgba(255,255,255,0.18); letter-spacing:4px; text-transform:uppercase; }

/* Album */
#album-art-wrap {
  position:relative; transition:all .7s ease;
  opacity:0; transform:scale(0.93);
}
#album-art-wrap.visible { opacity:1; transform:scale(1); }
#album-art-wrap.lyrics-mode { transform:scale(0.48) translateY(-85px); opacity:0.55; }
#np-art-big {
  width:240px; height:240px; border-radius:12px; object-fit:cover; display:block;
  box-shadow:0 0 100px var(--glow), 0 28px 64px rgba(0,0,0,0.65);
  transition:box-shadow 1.5s ease, opacity .6s;
}
.vinyl-ring {
  position:absolute; inset:-20px; border-radius:50%;
  border:1px solid rgba(255,255,255,0.07);
  animation:spin 14s linear infinite; opacity:0; transition:opacity .4s;
}
.vinyl-ring.visible { opacity:0.22; }
@keyframes spin { to { transform:rotate(360deg); } }

/* LYRICS */
#lyrics-panel {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:24px 44px; overflow:hidden;
  opacity:0; pointer-events:none; transition:opacity .5s;
}
#lyrics-panel.visible { opacity:1; pointer-events:auto; }
#lyrics-container {
  width:100%; max-width:680px;
  display:flex; flex-direction:column; align-items:center; gap:9px; overflow:hidden;
}
.lyric-line {
  font-family:'DM Sans',sans-serif; font-size:1.45rem; font-weight:300;
  text-align:center; line-height:1.5;
  color:rgba(255,255,255,0.16); transition:all .4s ease;
  transform:scale(0.89); opacity:0.3;
}
.lyric-line.near   { color:rgba(255,255,255,0.48); transform:scale(0.96); opacity:0.62; }
.lyric-line.active { color:#fff; font-size:1.9rem; font-weight:600; transform:scale(1); opacity:1; text-shadow:0 0 50px var(--glow); }
.lyric-line.past   { color:rgba(255,255,255,0.09); transform:scale(0.86); opacity:0.18; }
.lyrics-loading    { color:rgba(255,255,255,0.18); font-size:0.7rem; letter-spacing:2px; animation:blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Waveform */
#waveform { display:flex; align-items:flex-end; gap:3px; height:30px; margin-top:18px; opacity:0; transition:opacity .6s; }
#waveform.visible { opacity:0.45; }
.wbar { width:3px; border-radius:2px; background:var(--accent); animation:wb .9s ease-in-out infinite; transition:background 1.2s; }
@keyframes wb { 0%,100%{transform:scaleY(0.3)} 50%{transform:scaleY(1)} }

/* ── RIGHT PANEL (Spotify queue) ── */
#right-panel {
  display:flex; flex-direction:column;
  background:rgba(0,0,0,0.32); backdrop-filter:blur(10px); overflow:hidden;
}
#queue-header {
  padding:18px 22px 12px; border-bottom:1px solid rgba(255,255,255,0.05);
  display:flex; align-items:center; justify-content:space-between;
}
#queue-header h2 { font-family:'Bebas Neue',sans-serif; font-size:0.95rem; color:rgba(255,255,255,0.28); letter-spacing:3px; }
.queue-badge { font-size:0.55rem; background:var(--accent); color:#000; padding:2px 7px; border-radius:2px; font-weight:700; transition:background 1.2s; }
#queue-items { flex:1; overflow-y:auto; padding:10px 12px; display:flex; flex-direction:column; gap:7px; }
#queue-items::-webkit-scrollbar { width:2px; }
#queue-items::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); }

.q-item {
  display:flex; align-items:center; gap:10px;
  background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05);
  border-radius:6px; padding:9px 11px; animation:slideIn .35s ease; transition:border-color .5s;
}
.q-item:first-child { border-color:var(--accent); }
@keyframes slideIn { from{opacity:0;transform:translateX(10px)} to{opacity:1;transform:translateX(0)} }
.q-num { font-family:'Bebas Neue',sans-serif; font-size:1.2rem; color:rgba(255,255,255,0.13); width:20px; flex-shrink:0; text-align:right; }
.q-item:first-child .q-num { color:var(--accent); transition:color 1.2s; }
.q-art { width:36px; height:36px; border-radius:4px; object-fit:cover; flex-shrink:0; }
.q-info { flex:1; overflow:hidden; }
.q-name   { font-size:0.74rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.q-artist { font-size:0.6rem; color:rgba(255,255,255,0.32); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.q-empty  { color:rgba(255,255,255,0.15); font-size:0.68rem; text-align:center; padding:28px 0; letter-spacing:2px; }

/* ── BOTTOM BAR ── */
#bottombar {
  display:flex; align-items:center; justify-content:space-between; padding:10px 32px;
  border-top:1px solid rgba(255,255,255,0.04);
  background:rgba(0,0,0,0.42); backdrop-filter:blur(20px);
}
#pending-pill { display:flex; align-items:center; gap:6px; font-size:0.6rem; color:rgba(255,255,255,0.22); }
#pending-pill .p-num { font-family:'Bebas Neue',sans-serif; font-size:1rem; color:var(--accent); transition:color 1.2s; }
#lyrics-toggle {
  background:none; border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.3);
  border-radius:4px; padding:6px 14px; font-family:'Space Mono',monospace; font-size:0.62rem;
  cursor:pointer; letter-spacing:1px; transition:all .2s;
}
#lyrics-toggle:hover, #lyrics-toggle.on { border-color:var(--accent); color:var(--accent); }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <h1>📺 FLUX DISPLAY</h1>
  <p>Entre le nom de la fête et le mot de passe pour lancer l'affichage.</p>
  <label>NOM DE LA FÊTE</label>
  <input id="setup-code" type="text" placeholder="FIESTA24" maxlength="20"
         oninput="this.value=this.value.toUpperCase()"
         onkeydown="if(event.key==='Enter')document.getElementById('setup-pass').focus()"/>
  <label style="margin-top:10px">MOT DE PASSE</label>
  <input id="setup-pass" type="password" placeholder="••••••••"
         onkeydown="if(event.key==='Enter')doSetup()"/>
  <div class="err" id="setup-err"></div>
  <button class="btn-setup" id="setup-btn" onclick="doSetup()">Lancer →</button>
</div>

<!-- APP -->
<div id="app">
  <div id="bg-blur"></div>
  <div id="color-overlay"></div>
  <div id="main-layout">

    <div id="topbar">
      <div class="topbar-left">
        <div class="brand">🎵 FLUX</div>
        <div class="live-dot"></div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div id="clock">00:00</div>
        <button class="quit-btn" onclick="logoutDisplay()">⏻ QUITTER</button>
      </div>
    </div>

    <div id="npbar">
      <img id="np-art-small" class="loading" src="" alt="">
      <div class="np-meta">
        <div class="np-label">▶ EN COURS</div>
        <div id="np-title">—</div>
        <div id="np-artist">—</div>
      </div>
      <div id="progress-wrap">
        <div id="progress-track"><div id="progress-fill"></div></div>
        <div class="progress-times">
          <span id="p-elapsed">0:00</span>
          <span id="p-duration">0:00</span>
        </div>
      </div>
    </div>

    <div id="content">
      <div id="left-panel">
        <div id="no-music" class="visible">
          <div class="nm-icon">🎵</div>
          <div class="nm-text">Aucune musique en cours</div>
        </div>
        <div id="album-art-wrap">
          <div class="vinyl-ring" id="vinyl"></div>
          <img id="np-art-big" src="" alt="">
        </div>
        <div id="lyrics-panel">
          <div id="lyrics-container">
            <div class="lyrics-loading">CHARGEMENT DES PAROLES...</div>
          </div>
        </div>
        <div id="waveform">
          <div class="wbar" style="height:12px;animation-delay:0s"></div>
          <div class="wbar" style="height:28px;animation-delay:.1s"></div>
          <div class="wbar" style="height:18px;animation-delay:.2s"></div>
          <div class="wbar" style="height:36px;animation-delay:.05s"></div>
          <div class="wbar" style="height:22px;animation-delay:.15s"></div>
          <div class="wbar" style="height:32px;animation-delay:.25s"></div>
          <div class="wbar" style="height:14px;animation-delay:.3s"></div>
          <div class="wbar" style="height:40px;animation-delay:.08s"></div>
          <div class="wbar" style="height:20px;animation-delay:.18s"></div>
          <div class="wbar" style="height:30px;animation-delay:.22s"></div>
        </div>
      </div>

      <div id="right-panel">
        <div id="queue-header">
          <h2>FILE D'ATTENTE</h2>
          <span class="queue-badge" id="queue-count">0</span>
        </div>
        <div id="queue-items">
          <div class="q-empty">En attente...</div>
        </div>
      </div>
    </div>

    <div id="bottombar">
      <div id="pending-pill">
        <span class="p-num" id="pending-count">0</span>
        <span>demandes en attente</span>
      </div>
      <button id="lyrics-toggle" onclick="toggleLyrics()">🎤 PAROLES</button>
    </div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwSNcabHyotagsd9Xi1Hq_VJBUYbaee9Z9UcQHvhCWqubVauQg5eTgLutStZvBaVXV01Q/exec';

const S = {
  session:null, lyricsOn:false, lyrics:[], progressTimer:null,
  currentTrackId:null, progressMs:0, durationMs:0, isPlaying:false,
  queueTimer:null,
};

// ── Color extraction ──
function extractColor(imgUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try {
        const c = document.createElement('canvas');
        c.width = c.height = 50;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0, 50, 50);
        const data = ctx.getImageData(0,0,50,50).data;
        let r=0,g=0,b=0,count=0;
        for (let i=0;i<data.length;i+=16) {
          const sat = Math.max(data[i],data[i+1],data[i+2]) - Math.min(data[i],data[i+1],data[i+2]);
          if (sat > 35) { r+=data[i]; g+=data[i+1]; b+=data[i+2]; count++; }
        }
        if (!count) { resolve('#1DB954'); return; }
        r=Math.round(r/count); g=Math.round(g/count); b=Math.round(b/count);
        const boost=1.5;
        resolve(`rgb(${Math.min(255,Math.round(128+(r-128)*boost))},${Math.min(255,Math.round(128+(g-128)*boost))},${Math.min(255,Math.round(128+(b-128)*boost))})`);
      } catch(e) { resolve('#1DB954'); }
    };
    img.onerror = () => resolve('#1DB954');
    img.src = imgUrl;
  });
}

function applyAccent(color) {
  document.documentElement.style.setProperty('--accent', color);
  const glow = color.startsWith('rgb(')
    ? color.replace('rgb(','rgba(').replace(')',',0.28)')
    : 'rgba(29,185,84,0.28)';
  document.documentElement.style.setProperty('--glow', glow);
}

// ── SETUP ──
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('display_session');
  if (saved) document.getElementById('setup-code').value = saved;
});

async function doSetup() {
  const code = document.getElementById('setup-code').value.trim().toUpperCase();
  const pass = document.getElementById('setup-pass').value.trim();
  const err  = document.getElementById('setup-err');
  const btn  = document.getElementById('setup-btn');
  err.style.display='none';
  if (!code||!pass) { err.textContent='Remplis les deux champs'; err.style.display='block'; return; }
  btn.disabled=true; btn.textContent='...';
  try {
    const r = await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'validateSession',code,password:pass})});
    const d = await r.json();
    if (d.error) { err.textContent='Code ou mot de passe incorrect'; err.style.display='block'; return; }
    localStorage.setItem('display_session', code);
    S.session = code;
    startApp();
  } catch(e) { err.textContent='Erreur réseau'; err.style.display='block'; }
  finally { btn.disabled=false; btn.textContent='Lancer →'; }
}

function startApp() {
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='block';
  tickClock(); setInterval(tickClock, 1000);
  fetchNowPlaying(); setInterval(fetchNowPlaying, 5000);
  pollSpotifyQueue(); setInterval(pollSpotifyQueue, 3000);  // real-time queue
  pollPending(); setInterval(pollPending, 4000);
}

function tickClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}

function logoutDisplay() {
  if (!confirm('Quitter la session display ?')) return;
  localStorage.removeItem('display_session');
  location.reload();
}

// ── NOW PLAYING ──
async function fetchNowPlaying() {
  if (!S.session) return;
  try {
    const r = await fetch(`${API}?action=nowplaying&session=${S.session}`);
    const d = await r.json();
    if (!d.playing) { if (S.isPlaying) setNoMusic(); return; }
    S.isPlaying=true;
    S.progressMs=d.progress_ms||0; S.durationMs=d.duration_ms||1;
    startProgressTick();
    document.getElementById('np-title').textContent  = d.name;
    document.getElementById('np-artist').textContent = d.artist;
    const small = document.getElementById('np-art-small');
    small.src=d.artSmall||d.art||''; small.classList.remove('loading');
    if (d.id !== S.currentTrackId) {
      S.currentTrackId=d.id;
      document.getElementById('np-art-big').src = d.art||'';
      document.getElementById('bg-blur').style.backgroundImage=`url(${d.art})`;
      document.getElementById('bg-blur').classList.add('visible');
      document.getElementById('no-music').classList.remove('visible');
      document.getElementById('album-art-wrap').classList.add('visible');
      document.getElementById('waveform').classList.add('visible');
      document.getElementById('vinyl').classList.add('visible');
      if (d.art) {
        const color = await extractColor(d.art);
        applyAccent(color);
        document.getElementById('color-overlay').style.background =
          `radial-gradient(ellipse at 28% 50%, ${color.replace('rgb(','rgba(').replace(')',',0.07)')} 0%, transparent 65%)`;
        document.getElementById('color-overlay').classList.add('visible');
      }
      if (S.lyricsOn) fetchLyrics(d.name, d.artist, d.album, d.duration_ms);
    }
  } catch(e) {}
}

function setNoMusic() {
  S.isPlaying=false; S.currentTrackId=null;
  clearInterval(S.progressTimer);
  document.getElementById('no-music').classList.add('visible');
  document.getElementById('album-art-wrap').classList.remove('visible');
  document.getElementById('waveform').classList.remove('visible');
  document.getElementById('vinyl').classList.remove('visible');
  document.getElementById('bg-blur').classList.remove('visible');
  document.getElementById('color-overlay').classList.remove('visible');
  document.getElementById('np-title').textContent='—';
  document.getElementById('np-artist').textContent='';
  document.getElementById('progress-fill').style.width='0%';
  document.getElementById('p-elapsed').textContent='0:00';
  document.getElementById('p-duration').textContent='0:00';
  applyAccent('#1DB954');
}

function startProgressTick() {
  clearInterval(S.progressTimer);
  S.progressTimer = setInterval(() => {
    S.progressMs = Math.min(S.progressMs+1000, S.durationMs);
    document.getElementById('progress-fill').style.width = (S.progressMs/S.durationMs*100)+'%';
    document.getElementById('p-elapsed').textContent = msToTime(S.progressMs);
    document.getElementById('p-duration').textContent = msToTime(S.durationMs);
    if (S.lyricsOn && S.lyrics.length) updateActiveLyric(S.progressMs/1000);
  }, 1000);
}

function msToTime(ms) {
  const s=Math.floor(ms/1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

// ── SPOTIFY QUEUE (real-time, every 3s) ──
async function pollSpotifyQueue() {
  if (!S.session) return;
  try {
    const r = await fetch(`${API}?action=spotifyqueue&session=${S.session}`);
    const d = await r.json();
    renderQueue(d.queue || []);
  } catch(e) {}
}

function renderQueue(items) {
  const el = document.getElementById('queue-items');
  document.getElementById('queue-count').textContent = items.length;
  if (!items.length) { el.innerHTML='<div class="q-empty">File vide</div>'; return; }
  el.innerHTML = items.map((t,i) => `
    <div class="q-item">
      <div class="q-num">${i+1}</div>
      <img class="q-art" src="${t.img}" alt="">
      <div class="q-info">
        <div class="q-name">${t.name}</div>
        <div class="q-artist">${t.artist}</div>
      </div>
    </div>
  `).join('');
}

// ── PENDING COUNT (from sheet) ──
async function pollPending() {
  if (!S.session) return;
  try {
    const r = await fetch(`${API}?action=list&session=${S.session}`);
    const rows = await r.json();
    document.getElementById('pending-count').textContent = rows.filter(r=>r.status==='pending').length;
  } catch(e) {}
}

// ── LYRICS ──
function toggleLyrics() {
  S.lyricsOn = !S.lyricsOn;
  const btn  = document.getElementById('lyrics-toggle');
  const panel= document.getElementById('lyrics-panel');
  const wrap = document.getElementById('album-art-wrap');
  btn.classList.toggle('on', S.lyricsOn);
  if (S.lyricsOn) {
    panel.classList.add('visible'); wrap.classList.add('lyrics-mode');
    if (S.currentTrackId) {
      fetchLyrics(
        document.getElementById('np-title').textContent,
        document.getElementById('np-artist').textContent,
        '', S.durationMs
      );
    }
  } else {
    panel.classList.remove('visible'); wrap.classList.remove('lyrics-mode'); S.lyrics=[];
  }
}

async function fetchLyrics(title, artist, album, durationMs) {
  const container = document.getElementById('lyrics-container');
  container.innerHTML='<div class="lyrics-loading">CHARGEMENT DES PAROLES...</div>';
  S.lyrics=[];
  try {
    const params = new URLSearchParams({track_name:title, artist_name:artist});
    if (album) params.set('album_name',album);
    if (durationMs) params.set('duration',Math.floor(durationMs/1000));
    const r = await fetch(`https://lrclib.net/api/get?${params}`);
    if (!r.ok) { container.innerHTML='<div class="lyrics-loading">PAROLES NON DISPONIBLES</div>'; return; }
    const data = await r.json();
    if (data.syncedLyrics) {
      S.lyrics = parseSynced(data.syncedLyrics);
      container.innerHTML = S.lyrics.map((l,i)=>`<div class="lyric-line" data-i="${i}">${l.text||'·'}</div>`).join('');
      updateActiveLyric(S.progressMs/1000);
    } else if (data.plainLyrics) {
      container.innerHTML = data.plainLyrics.split('\n').filter(l=>l.trim())
        .map(l=>`<div class="lyric-line near">${l}</div>`).join('');
    } else {
      container.innerHTML='<div class="lyrics-loading">PAROLES NON DISPONIBLES</div>';
    }
  } catch(e) { container.innerHTML='<div class="lyrics-loading">ERREUR</div>'; }
}

function parseSynced(raw) {
  return raw.split('\n').map(line=>{
    const m=line.match(/^\[(\d+):(\d+(?:\.\d+)?)\](.*)/);
    if(!m) return null;
    return {time:parseInt(m[1])*60+parseFloat(m[2]), text:m[3].trim()};
  }).filter(Boolean);
}

function updateActiveLyric(sec) {
  if (!S.lyrics.length) return;
  let idx=0;
  for (let i=0;i<S.lyrics.length;i++) { if (S.lyrics[i].time<=sec) idx=i; else break; }
  document.querySelectorAll('.lyric-line').forEach((el,i)=>{
    const d=i-idx;
    el.classList.remove('active','near','past');
    if (d===0) el.classList.add('active');
    else if (Math.abs(d)===1) el.classList.add('near');
    else if (d<0) el.classList.add('past');
  });
  const active=document.querySelector('.lyric-line.active');
  if (active) active.scrollIntoView({behavior:'smooth',block:'center'});
}
</script>
